<style>
:root {
--bg-primary: #0f172a;
--bg-secondary: #1e293b;
--bg-card: rgba(30, 41, 59, 0.85);
--text-primary: #f1f5f9;
--accent: #38bdf8;
--radius-md: 20px;
--shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
font-family: 'Inter', sans-serif;
background: var(--bg-primary);
color: var(--text-primary);
height: 100vh;
overflow: hidden;
}

.app-container { 
max-width: 100%; 
margin: 0 auto; 
padding: 16px; 
height: 100vh;
display: flex;
flex-direction: column;
}

header { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; }
.logo { font-size: 1.4rem; font-weight: 800; color: var(--accent); }

.weather-icon-large img,
.hour-icon img,
.day-icon img {
border-radius: 16px;
object-fit: cover;
box-shadow: var(--shadow);
}

.weather-icon-large { width: 180px; height: 180px; }
.hour-icon img { width: 60px; height: 60px; border-radius: 12px; }
.day-icon img { width: 80px; height: 80px; border-radius: 16px; }

.card {
background: var(--bg-card);
border-radius: var(--radius-md);
padding: 20px;
backdrop-filter: blur(10px);
margin-bottom: 16px;
}
</style>

<body>

<div class="app-container">
<header>
<div class="logo">☀️ Clima Libre</div>
</header>

<div id="initialState" style="text-align:center; flex:1; display:flex; align-items:center; justify-content:center; flex-direction:column;">
<h2>Busca una ciudad o usa tu ubicación</h2>
<button onclick="getCurrentLocation()" style="padding:12px 24px; margin-top:20px; font-size:1.1rem;">📍 Mi ubicación</button>
</div>

<div id="weatherContent" style="display:none;">
<!-- Aquí irá el contenido del clima -->
</div>
</div>

<script>
// Configuración básica
async function getCurrentLocation() {
  if (!navigator.geolocation) return alert("Geolocalización no disponible");
  
  try {
    const pos = await new Promise((resolve, reject) => {
      navigator.geolocation.getCurrentPosition(resolve, reject);
    });
    
    await loadWeather(pos.coords.latitude, pos.coords.longitude, "Tu ubicación");
  } catch (e) {
    alert("Error al obtener ubicación");
  }
}

async function loadWeather(lat, lon, name) {
  // Aquí iría la lógica completa con Open-Meteo + ilustraciones
  document.getElementById('initialState').style.display = 'none';
  document.getElementById('weatherContent').style.display = 'block';
  document.getElementById('weatherContent').innerHTML = `
    <div class="card" style="text-align:center;">
      <h2>${name}</h2>
      <div class="weather-icon-large">
        <img src="https://i.imgur.com/placeholder.jpg" alt="clima" style="width:100%;">
      </div>
      <h1 style="font-size:4rem;">22°C</h1>
      <p>Parcialmente nublado</p>
    </div>
    <p style="text-align:center; color:#94a3b8; margin-top:20px;">
      Versión con ilustraciones de chica lista para personalizar
    </p>
  `;
}

// Inicializar
console.log("🌤️ Clima Libre con ilustraciones cargado!");
</script>

</body>
